<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蒸汽机械工坊</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <header id="game-header">
            <h1>⚙️ 蒸汽机械工坊 ⚙️</h1>
            <div class="stats">
                <span id="steam-pressure">蒸汽压力: 0 psi</span>
                <span id="coal-level">煤炭储量: 0</span>
            </div>
        </header>
        
        <div id="main-layout">
            <aside id="resource-panel">
                <h3>📦 工坊资源</h3>
                <div class="resource-list">
                    <div class="resource-item">
                        <div>
                            <span class="resource-icon">🔥</span>
                            <span class="resource-name">煤炭</span>
                        </div>
                        <div class="resource-info">
                            <span class="resource-amount" id="res-coal">0</span>
                            <span class="resource-max">/ 200</span>
                        </div>
                        <span class="resource-rate" id="rate-coal">+0/s</span>
                    </div>
                    <div class="resource-item">
                        <div>
                            <span class="resource-icon">💨</span>
                            <span class="resource-name">蒸汽</span>
                        </div>
                        <div class="resource-info">
                            <span class="resource-amount" id="res-steam">0</span>
                            <span class="resource-max">/ 100</span>
                        </div>
                        <span class="resource-rate" id="rate-steam">+0/s</span>
                    </div>
                    <div class="resource-item">
                        <div>
                            <span class="resource-icon">⚙️</span>
                            <span class="resource-name">齿轮零件</span>
                        </div>
                        <div class="resource-info">
                            <span class="resource-amount" id="res-gears">0</span>
                            <span class="resource-max">/ 1000</span>
                        </div>
                        <span class="resource-rate" id="rate-gears">+0/s</span>
                    </div>
                    <div class="resource-item">
                        <div>
                            <span class="resource-icon">🔩</span>
                            <span class="resource-name">金属板</span>
                        </div>
                        <div class="resource-info">
                            <span class="resource-amount" id="res-plates">0</span>
                            <span class="resource-max">/ 500</span>
                        </div>
                        <span class="resource-rate" id="rate-plates">+0/s</span>
                    </div>
                    <div class="resource-item">
                    <div>
                        <span class="resource-icon">🛠️</span>
                        <span class="resource-name">蒸汽管道</span>
                    </div>
                    <div class="resource-info">
                        <span class="resource-amount" id="res-pipes">0</span>
                        <span class="resource-max">/ 300</span>
                    </div>
                    <span class="resource-rate" id="rate-pipes">+0/s</span>
                </div>
                <div class="resource-item">
                    <div>
                        <span class="resource-icon">⚙️</span>
                        <span class="resource-name">高阶齿轮组</span>
                    </div>
                    <div class="resource-info">
                        <span class="resource-amount" id="res-advanced-gears">0</span>
                        <span class="resource-max">/ 100</span>
                    </div>
                    <span class="resource-rate" id="rate-advanced-gears">合成</span>
                </div>
                <div class="resource-item">
                    <div>
                        <span class="resource-icon">🔩</span>
                        <span class="resource-name">强化金属板</span>
                    </div>
                    <div class="resource-info">
                        <span class="resource-amount" id="res-reinforced-plates">0</span>
                        <span class="resource-max">/ 50</span>
                    </div>
                    <span class="resource-rate" id="rate-reinforced-plates">合成</span>
                </div>
                <div class="resource-item">
                    <div>
                        <span class="resource-icon">💎</span>
                        <span class="resource-name">蒸汽机核心</span>
                    </div>
                    <div class="resource-info">
                        <span class="resource-amount" id="res-steam-engine-core">0</span>
                        <span class="resource-max">/ 10</span>
                    </div>
                    <span class="resource-rate" id="rate-steam-engine-core">合成</span>
                </div>
            </div>
                <div class="production-summary">
                    <h4>📊 生产统计</h4>
                    <div class="stat-row">
                        <span>运行机械:</span>
                        <span id="active-machines">0</span>
                    </div>
                    <div class="stat-row">
                        <span>总产量:</span>
                        <span id="total-produced">0</span>
                    </div>
                </div>
                
                <div class="crafting-station">
                    <h3>🔧 零件合成台</h3>
                    <div class="recipe-list" id="recipe-list">
                    </div>
                </div>
            </aside>
            
            <main id="workshop">
            <div class="workshop-floor">
                <div class="machine" id="steam-engine-1" data-machine-type="steam-engine">
                    <div class="machine-body">
                        <div class="boiler"></div>
                        <div class="piston"></div>
                        <div class="flywheel"></div>
                        <div class="steam-pipe"></div>
                        <div class="gears">
                            <div class="gear gear-large"></div>
                            <div class="gear gear-medium"></div>
                            <div class="gear gear-small"></div>
                        </div>
                    </div>
                    <div class="machine-label">蒸汽机 #1</div>
                    <div class="machine-status">状态: 闲置</div>
                </div>
                
                <div class="machine" id="steam-engine-2" data-machine-type="steam-engine">
                    <div class="machine-body">
                        <div class="boiler"></div>
                        <div class="piston"></div>
                        <div class="flywheel"></div>
                        <div class="steam-pipe"></div>
                        <div class="gears">
                            <div class="gear gear-large"></div>
                            <div class="gear gear-medium"></div>
                            <div class="gear gear-small"></div>
                        </div>
                    </div>
                    <div class="machine-label">蒸汽机 #2</div>
                    <div class="machine-status">状态: 闲置</div>
                </div>
                
                <div class="machine" id="press-machine-1" data-machine-type="press-machine">
                    <div class="machine-body">
                        <div class="press-frame"></div>
                        <div class="press-plate"></div>
                        <div class="press-lever"></div>
                        <div class="gears">
                            <div class="gear gear-large"></div>
                            <div class="gear gear-small"></div>
                        </div>
                    </div>
                    <div class="machine-label">冲压机 #1</div>
                    <div class="machine-status">状态: 闲置</div>
                </div>
                
                <div class="furnace" id="coal-furnace">
                    <div class="furnace-body">
                        <div class="fire-box"></div>
                        <div class="chimney"></div>
                        <div class="coal-slot"></div>
                    </div>
                    <div class="machine-label">燃煤锅炉</div>
                    <div class="machine-status">状态: 熄火</div>
                </div>
            </div>
            
                <div class="steam-particles"></div>
            </main>
        </div>
        
        <footer id="control-panel">
            <button id="btn-start-all">启动全部机械</button>
            <button id="btn-stop-all">停止全部机械</button>
            <button id="btn-add-coal">添加煤炭</button>
        </footer>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/machines.js"></script>
    <script src="js/crafting.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
